services:
  - type: web
    name: smartsec-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GOOGLE_SAFE_BROWSING_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: IPINFO_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: alerts@smartsec.dev
      - key: ALLOWED_ORIGINS
        value: https://smartsec-ai.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
